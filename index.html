<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { max-width: 100%; overflow-x: hidden; }
  :root {
    --navy: #0f2744; --navy-light: #1a3a5c; --navy-deep: #091c33;

    --success: #2d7d4e; --success-bg: #e8f5ee;
    --warn: #b45309; --warn-bg: #fef3c7;
    --danger: #b91c1c; --danger-bg: #fee2e2;

  .input-error { border-color:var(--danger) !important; }
  .error-msg { font-size:12px; color:var(--danger); margin-top:2px; }
  textarea.form-input { resize:vertical; min-height:96px; }
  .checkbox-row { display:flex; align-items:flex-start; gap:10px; font-size:14px; color:var(--text-muted); line-height:1.6; cursor:pointer; }
  .checkbox-row input { width:17px; height:17px; min-width:17px; margin-top:2px; flex-shrink:0; accent-color:var(--navy); cursor:pointer; }

  /* Cards */
  .card { background:var(--white); border-radius:var(--radius-lg); border:1px solid var(--border); box-shadow:var(--shadow); }
  .card-body { padding:1.5rem; }

  /* Badges */
  .badge { display:inline-flex; align-items:center; gap:4px; padding:0.2rem 0.6rem; border-radius:20px; font-size:12px; font-weight:600; }
  .badge-gold { background:#fef3c7; color:var(--warn); }
  .badge-green { background:var(--success-bg); color:var(--success); }
  .badge-navy { background:#dbeafe; color:var(--info); }
  .badge-gray { background:var(--ice); color:var(--text-muted); }

  /* Status pills */
  .status { display:inline-block; padding:0.22rem 0.7rem; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap; }

  .hero { background:linear-gradient(160deg,#091c33 0%,#0f2744 55%,#1a3a5c 100%); padding:4.5rem 1.5rem 2.5rem; position:relative; overflow:hidden; }

// ── Pricing helpers ───────────────────────────────────────────────────
// calcPricing uses sourceMarketPrice (the market reference rate per day)
// as the base for all customer-facing prices.
// The 30% discount and 10% reservation fee run silently — never exposed
// as a formula on customer-facing pages.
const calcPricing = (vehicle, days) => {
  // ── Fixed-price override for internal test listings ──────────────────
  // If the vehicle carries _fixedPricing, return those values directly
  // without running the standard discount formula.
  if (vehicle._fixedPricing) return { ...vehicle._fixedPricing };

  const perDay   = vehicle.sourceMarketPrice || vehicle.pricePerDay || 0;
  const original = parseFloat((perDay * days).toFixed(2));          // Original Market Price
  const discounted  = parseFloat((original * 0.70).toFixed(2));     // DriveEuro Price
  const reservationFee = parseFloat((discounted * 0.10).toFixed(2)); // Reserve with 10% upfront
  const remaining   = parseFloat((discounted - reservationFee).toFixed(2)); // Balance due at collection
  const saved       = parseFloat((original - discounted).toFixed(2));
  return { original, discounted, reservationFee, remaining, saved };
};

const CLASS_ICONS = {

  'estate': 'mdi:car-estate', 'suv': 'mdi:car-suv', 'suv-luxury': 'mdi:car-suv',

};

/**
 * Normalise any vehicle class string to the lowercase-hyphen key used in CLASS_IMAGES.
 * e.g. "SUV Luxury" → "suv-luxury", "Electric Premium" → "electric-premium"
 */
function normalizeClassKey(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/&/g, 'and')
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '');
}

/**
 * Resolve the best available image URL for a vehicle.
 * Priority:
 *   A. vehicle.localImage         — explicit per-vehicle local override
 *   B. CLASS_IMAGES[normalised]   — class-based local file
 *   C. null                       — triggers icon fallback in VehicleImage
 *
 * Reads vehicle.vehicleClass || vehicle.class || vehicle.category || vehicle.type
 * so it works whether the vehicle came from VEHICLES array or an adapter layer.
 */
function getVehicleImage(vehicle) {
  if (!vehicle) return null;
  // A — explicit local image on the vehicle object
  if (vehicle.localImage) return vehicle.localImage;
  // B — resolve from class using normalised key
  const raw = vehicle.vehicleClass || vehicle.class || vehicle.category || vehicle.type || '';
  const key = normalizeClassKey(raw);
  return CLASS_IMAGES[key] || CLASS_IMAGES[normalizeClassKey(raw.split(' ')[0])] || CLASS_IMAGES['economy'] || null;
}

/**
 * Get the Iconify icon name for a vehicle class, for use in the fallback card.
 */
function getVehicleIcon(vehicle) {
  const raw = vehicle.vehicleClass || vehicle.class || vehicle.category || vehicle.type || '';
  const key = normalizeClassKey(raw);
  return CLASS_ICONS[key] || 'mdi:car-outline';
}

// Location autofill search
const searchLocations = (q) => {
  if (!q || q.length < 2) return [];
  const lower = q.toLowerCase();
  return LOCATION_SUGGESTIONS.filter(l =>
    l.name.toLowerCase().includes(lower) ||
    l.city.toLowerCase().includes(lower) ||
    l.country.toLowerCase().includes(lower) ||
    l.locationCode.toLowerCase().includes(lower)
  ).slice(0, 8);
};

const locPillClass = (type) => ({airport:'lp-airport',city:'lp-city',station:'lp-station',hub:'lp-hub'}[type]||'lp-hub');

// ── LocationInput component ────────────────────────────────────────────
function LocationInput({ value, onChange, placeholder, onSelect }) {
  const [open, setOpen] = useState(false);
  const [hov, setHov] = useState(-1);
  const suggestions = searchLocations(value);
  const wrapRef = React.useRef(null);

  // Close on outside click
  useEffect(() => {
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const pick = (loc) => { onChange(loc.name); onSelect && onSelect(loc); setOpen(false); setHov(-1); };

  const onKey = (e) => {
    if (!open || !suggestions.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setHov(h => Math.min(h+1, suggestions.length-1)); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setHov(h => Math.max(h-1, 0)); }
    if (e.key === 'Enter' && hov >= 0) pick(suggestions[hov]);
    if (e.key === 'Escape') setOpen(false);
  };

  return (
    <div className="loc-wrap" ref={wrapRef}>
      <input
        className="form-input"
        placeholder={placeholder}
        value={value}
        onChange={e => { onChange(e.target.value); setOpen(true); setHov(-1); }}
        onFocus={() => setOpen(true)}
        onKeyDown={onKey}
        autoComplete="off"
      />
      {open && suggestions.length > 0 && (
        <div className="loc-dd">
          {suggestions.map((loc, i) => (
            <div
              key={loc.locationCode}
              className={`loc-item${i===hov?' hov':''}`}
              onMouseEnter={() => setHov(i)}
              onMouseDown={() => pick(loc)}
            >
              <Icon name={loc.type==='airport'?'mdi:airplane':'mdi:map-marker-outline'} sz={16} cls="icon-muted" style={{marginTop:2, flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div className="loc-name">{loc.name}</div>
                <div className="loc-meta">{loc.city} · {loc.country}</div>
              </div>
              <span className={`loc-pill ${locPillClass(loc.type)}`}>{loc.type}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// localStorage persistence helpers
const LS_KEY = 'driveeuro_search';
const loadSearch = () => { try { const s = localStorage.getItem(LS_KEY); return s ? JSON.parse(s) : null; } catch { return null; } };
const saveSearch = (s) => { try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch {} };

const SEARCH_DEFAULTS = { pickup:'', dropoff:'', pickupCode:'', dropoffCode:'', pickupDate:'', pickupTime:'10:00', returnDate:'', returnTime:'10:00', driverAge:'30-65', vehicleType:'' };

function App() {
  const [page, setPage] = useState('home');
  // Restore search from localStorage on mount; fall back to defaults
  const [searchParams, setSearchParams] = useState(() => ({ ...SEARCH_DEFAULTS, ...(loadSearch()||{}) }));
  const [selectedVehicle, setSelectedVehicle] = useState(null);
  const [days, setDays] = useState(7);
  const [bookings, setBookings] = useState(BOOKINGS_INIT);
  const [confirmData, setConfirmData] = useState(null);
  const [navOpen, setNavOpen] = useState(false);
  const [currency, setCurrency] = useState(() => { try { return localStorage.getItem('driveeuro_cur')||'GBP'; } catch { return 'GBP'; } });

  // ── Test mode — activated by ?test=1 in the URL ────────────────────────
  // This flag enables the hidden payment verification listing.
  // It is never set by normal navigation; only by the URL query parameter.
  const [testMode, setTestMode] = useState(false);

  // Detect ?test=1 on mount and route straight to the test listing details
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('test') === '1') {
      setTestMode(true);
      setSelectedVehicle(TEST_VEHICLE);
      setDays(1);
      setPage('details');
      window.scrollTo(0, 0);
    }
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Persist searchParams to localStorage whenever they change
  useEffect(() => { saveSearch(searchParams); }, [searchParams]);

  // Persist currency selection
  useEffect(() => { try { localStorage.setItem('driveeuro_cur', currency); } catch {} }, [currency]);

  // ── Handle Rampex return redirect ─────────────────────────────────────
  // Rampex redirects back to /?payment=success|cancelled&provider=rampex&booking=REF
  // This effect runs once on mount and handles both outcomes.
  useEffect(() => {
    const handleRampexReturnIfNeeded = async () => {
      const params   = new URLSearchParams(window.location.search);
      const payment  = params.get('payment');
      const provider = params.get('provider');
      if (provider !== 'rampex') return; // not a Rampex return

      // Clean the URL so refreshing does not re-trigger
      window.history.replaceState({}, document.title, window.location.pathname);

      // Retrieve the pending payment record saved before redirect
      let pending = null;
      try {
        const raw = localStorage.getItem('driveEuroPendingPayment');
        if (raw) pending = JSON.parse(raw);
      } catch { /* malformed — treat as null */ }

      if (payment === 'cancelled') {
        // ── Customer cancelled at Rampex checkout ─────────────────────
        try { localStorage.removeItem('driveEuroPendingPayment'); } catch {}
        alert('Payment was not completed. Your vehicle has not been reserved yet.');
        setPage('home');
        return;
      }

      if (payment === 'success') {
        // ── Customer returned after Rampex checkout ────────────────────
        const bookingRef = params.get('booking') || pending?.bookingReference || genId();
        const paymentId  = pending?.paymentId || null;

        // Optionally verify status with rampex-payment-status
        let statusResult = null;
        if (paymentId) {
          try {
            const res = await fetch('/api/rampex-payment-status', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify({ paymentId, bookingReference: bookingRef }),
            });
            if (res.ok) statusResult = await res.json();
          } catch (err) {
            console.error('[DriveEuro] rampex-payment-status error:', err.message);
            // Non-fatal — we continue and show the booking anyway
          }
        }

        // Determine if the payment is confirmed, pending, or unknown
        const paidStatuses = ['paid', 'completed', 'success', 'captured', 'approved', 'settled'];
        const isPaid = statusResult
          ? paidStatuses.includes((statusResult.status || '').toLowerCase())
          : true; // if we could not verify, optimistically continue and advise customer to contact us

        // Persist result
        try {
          if (statusResult) localStorage.setItem('driveEuroPaymentResult', JSON.stringify(statusResult));
          localStorage.removeItem('driveEuroPendingPayment');
        } catch {}

        // Build the booking confirmation object
        const ref = bookingRef;
        const booking = {
          id:              ref,
          customer:        pending?.customer?.fullName   || '',
          email:           pending?.customer?.email      || '',
          phone:           pending?.customer?.phone      || '',
          dob:             pending?.customer?.dob        || '',
          driverAge:       pending?.customer?.driverAge  || '',
          vehicle:         pending?.vehicleName          || '',
          supplier:        pending?.supplierName         || '',
          pickup:          pending?.trip?.pickupLocation  || '',
          dropoff:         pending?.trip?.dropoffLocation || pending?.trip?.pickupLocation || '',
          pickupDate:      pending?.trip?.pickupDate     || '',
          pickupTime:      pending?.trip?.pickupTime     || '',
          returnDate:      pending?.trip?.returnDate     || '',
          returnTime:      pending?.trip?.returnTime     || '',
          currency:        pending?.currency             || 'GBP',
          days:            pending?.days                 || 7,
          originalPrice:   pending?.originalPrice        || 0,
          discountedPrice: pending?.discountedPrice      || 0,
          reservationFee:  pending?.reservationFee       || 0,
          remaining:       pending?.remaining            || 0,
          saved:           pending?.saved                || 0,
          status:          isPaid ? 'reserved' : 'reserved', // still reserved — balance due later
          paymentMethod:   'rampex',
          paymentId:       paymentId,
          providerRef:     statusResult?.providerReference || null,
          paymentStatus:   statusResult?.status || (isPaid ? 'paid' : 'pending'),
          supplierRef:     '',
          internalNotes:   '',
          balanceNotes:    pending?.trip?.specialRequests || '',
          created:         new Date().toISOString().split('T')[0],
        };

        setBookings(b => [booking, ...b]);
        setConfirmData({ ...booking, isPaid });
        setPage('confirmation');
        window.scrollTo(0, 0);
      }
    };

    handleRampexReturnIfNeeded();
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Hidden admin: Ctrl+Shift+A keyboard shortcut
  useEffect(() => {
    const handler = (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'A') { setPage('admin'); window.scrollTo(0,0); }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  // Hidden admin: #admin URL hash
  useEffect(() => {
    if (window.location.hash === '#admin') setPage('admin');
  }, []);

  const navigate = (p, extra = {}) => {
    setPage(p); setNavOpen(false);
    if (extra.vehicle) setSelectedVehicle(extra.vehicle);
    if (extra.days) setDays(extra.days);
    if (extra.confirmation) setConfirmData(extra.confirmation);
    window.scrollTo(0, 0);
  };

  const fmt = (n) => fmtCurrency(n, currency); // currency-aware formatter

  return (
    <div>
      <nav className="nav">
        <div className="nav-inner">
          <div className="logo" onClick={() => navigate('home')} aria-label="DriveEuro home">
            <img
              src="/assets/driveeuro-logo-white.png"
              alt="DriveEuro"
              className="brand-logo"
              onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }}
            />
            <span style={{display:'none'}}>Drive<span style={{color:'var(--gold)'}}>Euro</span></span>
          </div>
          <div className={`nav-links ${navOpen ? 'open' : ''}`}>
            <span className="nav-link" onClick={() => navigate('home')}>Home</span>
            <span className="nav-link" onClick={() => navigate('how')}>How It Works</span>
            <span className="nav-link" onClick={() => navigate('faqs')}>FAQs</span>
            {/* Currency selector */}
            <select
              className="currency-sel"
              value={currency}
              onChange={e => setCurrency(e.target.value)}
              aria-label="Select currency"
            >
              <option value="GBP">£ GBP</option>
              <option value="EUR">€ EUR</option>
              <option value="USD">$ USD</option>
            </select>
            {/* Staff portal hidden from public nav — access via Ctrl+Shift+A or #admin */}
          </div>
          <button className="nav-mobile-toggle" onClick={() => setNavOpen(!navOpen)}>☰</button>
        </div>
      </nav>

      {page==='home'         && <HomePage navigate={navigate} searchParams={searchParams} setSearchParams={setSearchParams} currency={currency} fmt={fmt}/>}
      {page==='results'      && <ResultsPage navigate={navigate} days={days} currency={currency} fmt={fmt}/>}
      {page==='details'      && <DetailsPage navigate={navigate} vehicle={selectedVehicle} days={days} currency={currency} fmt={fmt} testMode={testMode}/>}
      {page==='checkout'     && <CheckoutPage navigate={navigate} vehicle={selectedVehicle} days={days} searchParams={searchParams} setBookings={setBookings} currency={currency} fmt={fmt} testMode={testMode}/>}
      {page==='confirmation' && <ConfirmationPage navigate={navigate} data={confirmData} currency={currency} fmt={fmt}/>}
      {page==='how'          && <HowItWorksPage navigate={navigate}/>}
      {page==='faqs'         && <FAQsPage/>}
      {page==='terms'        && <LegalPage which="terms"/>}
      {page==='privacy'      && <LegalPage which="privacy"/>}
      {page==='cancellation' && <LegalPage which="cancellation"/>}
      {page==='admin'        && <AdminPage navigate={navigate} bookings={bookings} setBookings={setBookings}/>}

      <Footer navigate={navigate}/>
    </div>
  );
}

    airport:false, unlimitedMileage:false, crossBorder:false,
    electricOnly:false, luxuryOnly:false, depositRequired:false,
    hotelDelivery:false, airportMeetGreet:false, premiumInsuranceAvail:false,
    minAge:0,
  });
  const [sort, setSort] = useState('price-asc');
  const [rentalDays, setRentalDays] = useState(initDays || 7);
  const [filtersOpen, setFiltersOpen] = useState(false);
  const toggle = (k) => setFilters(f => ({...f,[k]:!f[k]}));
  const toggleArr = (k,v) => setFilters(f => ({...f,[k]:f[k].includes(v)?f[k].filter(x=>x!==v):[...f[k],v]}));

  let results = VEHICLES.filter(v => {
    if (filters.types.length && !filters.types.includes(v.type)) return false;
    if (filters.transmission.length && !filters.transmission.includes(v.transmission)) return false;
    if (filters.fuel.length && !filters.fuel.includes(v.fuel)) return false;
    if (filters.country && v.country !== filters.country) return false;
    if (filters.seats > 0 && v.seats < filters.seats) return false;
    if (filters.airport && !v.airport) return false;
    if (filters.unlimitedMileage && !v.unlimitedMileage) return false;
    if (filters.crossBorder && !v.crossBorder) return false;
    if (filters.electricOnly && v.fuel !== 'Electric') return false;
    if (filters.luxuryOnly && v.type !== 'Luxury') return false;
    if (filters.depositRequired && !v.depositRequired) return false;
    if (filters.hotelDelivery && !v.hotelDelivery) return false;
    if (filters.airportMeetGreet && !v.airportMeetGreet) return false;
    if (filters.premiumInsuranceAvail && !v.premiumInsuranceAvail) return false;
    if (filters.minAge > 0 && v.minAge > filters.minAge) return false;
    return true;

              <div style={{display:'flex', gap:'0.75rem', alignItems:'center', flexWrap:'wrap'}}>
                <select className="form-input" style={{width:'auto', fontSize:13}} value={sort} onChange={e=>setSort(e.target.value)}>
                  <option value="price-asc">Price: low → high</option>

            <div className="alert alert-gold" style={{marginBottom:'1rem', fontSize:13}}>
              <Icon name="mdi:information-outline" sz={18} cls="icon-gold" style={{flexShrink:0}}/><span><strong>DriveEuro prices shown.</strong> {OPERATIONAL_DISCLAIMER}</span>

            {results.length === 0 ? (

                <h3 style={{color:'var(--navy)', marginBottom:'0.5rem'}}>No vehicles match your filters</h3>

// ── Checkout ──────────────────────────────────────────────────────────
function CheckoutPage({ navigate, vehicle, days, searchParams, setBookings, currency, fmt, testMode }) {
  const today = todayStr();
  const TIMES = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00'];

  const [step, setStep] = useState(1);
  const [form, setForm] = useState(() => ({
    // Driver details
    fullName:'', email:'', phone:'', dob:'',
    driverAge: searchParams?.driverAge || '',
    // Trip details — pre-filled from search
    pickupLocation: searchParams?.pickup || vehicle?.city || '',
    pickupCode:     searchParams?.pickupCode || '',
    dropoffLocation: searchParams?.dropoff || vehicle?.city || '',
    dropoffCode:    searchParams?.dropoffCode || '',
    pickupDate:  searchParams?.pickupDate  || '',
    pickupTime:  searchParams?.pickupTime  || '10:00',
    returnDate:  searchParams?.returnDate  || '',
    returnTime:  searchParams?.returnTime  || '10:00',
    specialRequests:'', agreedTerms:false, agreedAge:false,
  }));
  const [errors, setErrors] = useState({});
  const [payProcessing, setPayProcessing] = useState(false);
  const [payMethod, setPayMethod] = useState('rampex'); // 'rampex' | 'card' | 'klarna'
  const [payMsg, setPayMsg] = useState(''); // inline user-facing message during pay flow

  if (!vehicle) return <div className="container" style={{padding:'3rem'}}><button className="btn btn-navy btn-sm" onClick={()=>navigate('results',{days:7})}>← Back to results</button></div>;
  const p = calcPricing(vehicle, days||7);
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));

  // Date logic helpers
  const handlePickupDateChange = (v) => {
    setF('pickupDate', v);
    if (form.returnDate && form.returnDate < v) {
      setF('returnDate', v); // auto-move return to pickup date
    }
  };
  const handleReturnDateChange = (v) => {
    if (form.pickupDate && v < form.pickupDate) return; // block past return
    setF('returnDate', v);
  };

  // Same-day return time validation
  const sameDay = form.pickupDate && form.returnDate && form.pickupDate === form.returnDate;
  const returnTimeInvalid = sameDay && timeToMinutes(form.returnTime) <= timeToMinutes(form.pickupTime);

  const validate = () => {
    const e = {};
    if (step===1) {
      if (!form.fullName.trim()) e.fullName='Required';
      if (!form.email.includes('@')) e.email='Valid email required';
      if (!form.phone.trim()) e.phone='Required';
      if (!form.dob) e.dob='Required';
      if (!form.driverAge) e.driverAge='Required';
    }
    if (step===2) {
      if (!form.pickupLocation.trim()) e.pickupLocation='Required';
      if (!form.pickupDate) e.pickupDate='Please select a pickup date';
      if (form.pickupDate < today) e.pickupDate='Pickup date cannot be in the past';
      if (!form.returnDate) e.returnDate='Please select a return date';
      if (form.returnDate && form.pickupDate && form.returnDate < form.pickupDate) e.returnDate='Return date must be on or after pickup date';
      if (returnTimeInvalid) e.returnTime='Return time must be later than pickup time for same-day rentals';
      if (!form.agreedTerms) e.agreedTerms='You must agree to the terms';
      if (!form.agreedAge) e.agreedAge='Please confirm your licence';
    }
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleNext = () => { if (validate()) setStep(s=>s+1); };

  // ── Rampex payment integration ─────────────────────────────────────────
  //
  // startPaymentFlow(method) calls /api/create-rampex-payment-link,
  // stores a pending payment record in localStorage, then redirects the customer
  // to the Rampex-hosted checkout page.
  //
  // On return, handleRampexReturnIfNeeded() (mounted in App on page load) reads
  // the URL query params, optionally calls /api/rampex-payment-status,
  // and routes to the confirmation page.
  //
  // Klarna remains disabled until merchant integration is approved and tested.
  const startPaymentFlow = async (method) => {
    if (method === 'klarna') return; // guard — button is already disabled

    // Full form validation before initiating payment
    const preValidateErrors = {};
    if (!form.fullName.trim())          preValidateErrors.fullName       = 'Required';
    if (!form.email.includes('@'))      preValidateErrors.email          = 'Valid email required';
    if (!form.phone.trim())             preValidateErrors.phone          = 'Required';
    if (!form.dob)                      preValidateErrors.dob            = 'Required';
    if (!form.driverAge)                preValidateErrors.driverAge      = 'Required';
    if (!form.pickupLocation.trim())    preValidateErrors.pickupLocation  = 'Required';
    if (!form.pickupDate)               preValidateErrors.pickupDate     = 'Please select a pickup date';
    if (form.pickupDate && form.pickupDate < todayStr()) preValidateErrors.pickupDate = 'Pickup date cannot be in the past';
    if (!form.returnDate)               preValidateErrors.returnDate     = 'Please select a return date';
    if (form.returnDate && form.pickupDate && form.returnDate < form.pickupDate) preValidateErrors.returnDate = 'Return date must be on or after pickup date';
    if (!form.agreedTerms)              preValidateErrors.agreedTerms    = 'You must agree to the terms';
    if (!form.agreedAge)                preValidateErrors.agreedAge      = 'Please confirm your licence';

    if (Object.keys(preValidateErrors).length > 0) {
      setErrors(preValidateErrors);
      setStep(Object.keys(preValidateErrors).some(k => ['fullName','email','phone','dob','driverAge'].includes(k)) ? 1 : 2);
      return;
    }

    setPayProcessing(true);
    setPayMsg('');

    const bookingReference = genId();

    // ── Test listing: enforce fixed £1.00 GBP payment amount ─────────────
    // The _isTestListing flag guarantees the payment request is always £1.00
    // regardless of currency selector state, preventing accidental larger charges.
    const chargeAmount   = vehicle._isTestListing ? 1.00     : p.reservationFee;
    const chargeCurrency = vehicle._isTestListing ? 'GBP'    : currency;

    // Pending payment record — survives the Rampex redirect so we can
    // reconstruct the booking on return
    const pendingPayment = {
      bookingReference,
      method,
      vehicleName:      vehicle.name,
      supplierName:     vehicle.supplier,
      currency:         chargeCurrency,
      amount:           chargeAmount,
      originalPrice:    p.original,
      discountedPrice:  p.discounted,
      reservationFee:   chargeAmount,    // always £1.00 for test listings
      remaining:        p.remaining,
      saved:            p.saved,
      days:             days || 1,
      paymentId:        null, // will be populated from createResult below
      isTestPayment:    vehicle._isTestListing || false,
      customer: {
        fullName:   form.fullName,
        email:      form.email,
        phone:      form.phone,
        dob:        form.dob,
        driverAge:  form.driverAge,
      },
      trip: {
        pickupLocation:  form.pickupLocation,
        pickupCode:      form.pickupCode,
        dropoffLocation: form.dropoffLocation || form.pickupLocation,
        dropoffCode:     form.dropoffCode,
        pickupDate:      form.pickupDate,
        pickupTime:      form.pickupTime,
        returnDate:      form.returnDate,
        returnTime:      form.returnTime,
        specialRequests: form.specialRequests,
      },
      createdAt: new Date().toISOString(),
    };

    try {
      localStorage.setItem('driveEuroPendingPayment', JSON.stringify(pendingPayment));
    } catch { /* non-fatal */ }

    // Call Rampex API via Vercel route to create the payment link
    let createResult;
    try {
      const res = await fetch('/api/create-rampex-payment-link', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount:           chargeAmount,      // £1.00 for test; normal fee otherwise
          currency:         chargeCurrency,    // GBP locked for test
          bookingReference,
          vehicleName:      vehicle.name,
          customerEmail:    form.email,
          customerName:     form.fullName,
          paymentMethod:    method,
          trip:             pendingPayment.trip,
        }),
      });
      createResult = await res.json();
      if (!res.ok || !createResult.paymentUrl) {
        // Log the full safe error response for debugging — never shown to customer
        console.log('[DriveEuro] create-rampex-payment-link failed response:', JSON.stringify(createResult));
        throw new Error(createResult.error || 'No payment URL returned from provider');
      }
    } catch (err) {
      // err.message is logged server-side; only the generic message is shown to the customer
      console.error('[DriveEuro] create-rampex-payment-link error:', err.message);
      setPayMsg('We could not connect to the payment provider. Please try again.');
      setPayProcessing(false);
      return;
    }

    // Persist the paymentId returned so we can check status on return
    if (createResult.paymentId) {
      try {
        const updated = { ...pendingPayment, paymentId: createResult.paymentId };
        localStorage.setItem('driveEuroPendingPayment', JSON.stringify(updated));
      } catch {}
    }

    // Redirect customer to Rampex hosted checkout
    window.location.href = createResult.paymentUrl;
  };

  // ── Trip Summary block (used in step 2 and sidebar) ──────────────────
  const TripSummaryBlock = ({ compact }) => {
    const hasTrip = form.pickupLocation && form.pickupDate && form.returnDate;
    if (!hasTrip && compact) return null;
    return (
      <div style={{background:'var(--ice)', borderRadius:10, padding:'1rem', fontSize:13, marginBottom: compact?0:'1rem'}}>
        <div style={{fontWeight:700, color:'var(--navy)', marginBottom:'0.5rem', fontSize:compact?13:14, display:'flex', alignItems:'center', gap:6}}>
          <Icon name="mdi:car-key" sz={16} cls="icon-navy"/>Trip Summary
        </div>
        {[
          ['Vehicle', `${vehicle.name} or similar`, 'mdi:car-outline'],
          ['Supplier', vehicle.supplier, 'mdi:domain'],
          ['Pickup', form.pickupLocation || '—', 'mdi:map-marker-outline'],
          ['Drop-off', form.dropoffLocation || form.pickupLocation || '—', 'mdi:map-marker-check-outline'],
          ['Pickup date & time', form.pickupDate ? `${form.pickupDate} at ${form.pickupTime}` : '—', 'mdi:calendar-start-outline'],
          ['Return date & time', form.returnDate ? `${form.returnDate} at ${form.returnTime}` : '—', 'mdi:calendar-end-outline'],
          ['Driver age', form.driverAge || searchParams?.driverAge || '—', 'mdi:account-clock-outline'],
          ['Currency', currency, 'mdi:currency-gbp'],
        ].map(([label, val, icon]) => (
          <div key={label} style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', padding:'0.28rem 0', borderBottom:'1px solid var(--border)', gap:8}}>
            <span style={{color:'var(--text-muted)', display:'flex', alignItems:'center', gap:4, flexShrink:0}}>
              <Icon name={icon} sz={13} cls="icon-muted"/>{label}
            </span>
            <span style={{fontWeight:500, textAlign:'right', fontSize:12.5}}>{val}</span>
          </div>
        ))}
        <div style={{paddingTop:'0.5rem', display:'flex', flexDirection:'column', gap:'0.3rem'}}>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:13}}>
            <span style={{color:'var(--text-muted)'}}>DriveEuro Price</span>
            <strong style={{color:'var(--navy)'}}>{fmt(p.discounted)}</strong>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:13}}>
            <span style={{color:'var(--text-muted)'}}>Reserve with 10% upfront</span>
            <strong style={{color:'var(--warn)'}}>{fmt(p.reservationFee)}</strong>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:13}}>
            <span style={{color:'var(--text-muted)'}}>Balance due at collection</span>
            <strong>{fmt(p.remaining)}</strong>
          </div>
        </div>
      </div>
    );
  };

  const SummaryBar = () => (
    <div>
      <div className="price-block">
        <div style={{fontWeight:700, fontSize:15, color:'#fff', marginBottom:'0.75rem'}}>Your booking</div>
        <div className="price-row"><span className="price-row-label">{vehicle.name} or similar</span><span className="price-row-val" style={{fontSize:12}}>{vehicle.supplier}</span></div>
        <div className="price-row"><span className="price-row-label">Pickup</span><span className="price-row-val" style={{fontSize:12, textAlign:'right', maxWidth:160}}>{form.pickupLocation||vehicle.city}</span></div>
        {(form.pickupDate||form.returnDate) && <div className="price-row"><span className="price-row-label">Dates</span><span className="price-row-val" style={{fontSize:12}}>{form.pickupDate||'—'} → {form.returnDate||'—'}</span></div>}
        <div className="price-row"><span className="price-row-label">Duration</span><span className="price-row-val">{days} days</span></div>
        <div style={{height:1, background:'rgba(255,255,255,0.12)', margin:'0.5rem 0'}}/>
        <div className="price-row"><span className="price-row-label">Standard price</span><span className="price-row-val" style={{opacity:0.5, textDecoration:'line-through'}}>{fmt(p.original)}</span></div>
        <div className="price-row"><span className="price-row-label">You save</span><span className="price-row-val price-row-green">Save {fmt(p.saved)}</span></div>
        <div className="price-row"><span className="price-row-label" style={{fontWeight:600, color:'#fff'}}>DriveEuro Price</span><span className="price-row-val price-row-gold" style={{fontWeight:800, fontSize:'1.05rem'}}>{fmt(p.discounted)}</span></div>
        <div style={{height:1, background:'rgba(255,255,255,0.12)', margin:'0.6rem 0'}}/>
        <div className="price-row"><span className="price-row-label">Reserve with 10% upfront</span><span className="price-row-val price-row-gold" style={{fontWeight:800, fontSize:'1.1rem'}}>{fmt(p.reservationFee)}</span></div>
        <div className="price-row"><span className="price-row-label">Balance due at collection</span><span className="price-row-val">{fmt(p.remaining)}</span></div>
        <div className="disclaimer-box" style={{fontSize:11}}>{OPERATIONAL_DISCLAIMER}</div>
      </div>
      <div className="alert alert-gold" style={{marginTop:'0.875rem', fontSize:12}}>
        <Icon name="mdi:refresh" sz={16} cls="icon-gold" style={{flexShrink:0}}/><span>{REFUND_NOTE}</span>
      </div>
    </div>
  );

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-header-inner">
          <div className="page-header-title">Complete your reservation</div>
          <div className="page-header-sub">{vehicle.name} or similar · {vehicle.supplier} · {days} days</div>
        </div>
      </div>
      <div className="container" style={{padding:'2rem 1.5rem'}}>
        <div className="steps">
          {[['Driver details',1],['Trip & terms',2],['Secure payment',3]].map(([l,n])=>(
            <div key={n} className={`step ${step===n?'active':step>n?'done':''}`}>{step>n?'✓ ':''}{l}</div>
          ))}
        </div>
        <div className="checkout-layout">
          <div>
            {step===1 && (
              <div className="card card-body">
                <h2 style={{color:'var(--navy)', fontWeight:700, marginBottom:'1.1rem', fontSize:'1.15rem'}}>Driver details</h2>
                <div style={{display:'flex', flexDirection:'column', gap:'0.9rem'}}>
                  <div className="form-group">
                    <label className="form-label">Full name (as on licence)</label>
                    <input className={`form-input ${errors.fullName?'input-error':''}`} value={form.fullName} onChange={e=>setF('fullName',e.target.value)} placeholder="Your full name (as on licence)"/>
                    {errors.fullName && <span className="error-msg">{errors.fullName}</span>}
                  </div>
                  <div className="grid-2">
                    <div className="form-group">
                      <label className="form-label">Email address</label>
                      <input type="email" className={`form-input ${errors.email?'input-error':''}`} value={form.email} onChange={e=>setF('email',e.target.value)} placeholder="you@example.com"/>
                      {errors.email && <span className="error-msg">{errors.email}</span>}
                    </div>
                    <div className="form-group">
                      <label className="form-label">Phone number</label>
                      <input type="tel" className={`form-input ${errors.phone?'input-error':''}`} value={form.phone} onChange={e=>setF('phone',e.target.value)} placeholder="Mobile number"/>
                      {errors.phone && <span className="error-msg">{errors.phone}</span>}
                    </div>
                  </div>
                  <div className="grid-2">
                    <div className="form-group">
                      <label className="form-label">Date of birth</label>
                      <input type="date" className={`form-input ${errors.dob?'input-error':''}`} value={form.dob} onChange={e=>setF('dob',e.target.value)}/>
                      {errors.dob && <span className="error-msg">{errors.dob}</span>}
                    </div>
                    <div className="form-group">
                      <label className="form-label">Driver age category</label>
                      <select className={`form-input ${errors.driverAge?'input-error':''}`} value={form.driverAge} onChange={e=>setF('driverAge',e.target.value)}>
                        <option value="">Select age</option>
                        <option>Under 21</option><option>21-24</option><option>25-29</option><option>30-65</option><option>66+</option>
                      </select>
                      {errors.driverAge && <span className="error-msg">{errors.driverAge}</span>}
                    </div>
                  </div>
                  <div className="alert alert-info" style={{fontSize:12}}><Icon name="mdi:information-outline" sz={15} cls="icon-faint" style={{flexShrink:0}}/> A young driver surcharge may apply for drivers under 25, payable at the desk. Minimum age for this vehicle: {vehicle.minAge}.</div>
                </div>
                <div style={{marginTop:'1.25rem', display:'flex', justifyContent:'flex-end'}}>
                  <button className="btn btn-primary" onClick={handleNext}>Next: trip details →</button>
                </div>
              </div>
            )}

            {step===2 && (
              <div className="card card-body">
                <h2 style={{color:'var(--navy)', fontWeight:700, marginBottom:'1.1rem', fontSize:'1.15rem'}}>Trip details &amp; terms</h2>
                <div style={{display:'flex', flexDirection:'column', gap:'0.9rem'}}>

                  {/* Location fields with autofill */}
                  <div className="grid-2">
                    <div className="form-group">
                      <label className="form-label">Pickup location</label>
                      <LocationInput
                        value={form.pickupLocation}
                        onChange={v=>setF('pickupLocation',v)}
                        placeholder="Where are you collecting from?"
                        onSelect={loc=>{setF('pickupLocation',loc.name);setF('pickupCode',loc.locationCode);}}
                      />
                      {errors.pickupLocation && <span className="error-msg">{errors.pickupLocation}</span>}
                    </div>
                    <div className="form-group">
                      <label className="form-label">Drop-off location</label>
                      <LocationInput
                        value={form.dropoffLocation}
                        onChange={v=>setF('dropoffLocation',v)}
                        placeholder="Same location or choose another"
                        onSelect={loc=>{setF('dropoffLocation',loc.name);setF('dropoffCode',loc.locationCode);}}
                      />
                    </div>
                  </div>

                  {/* Date fields with min constraints */}
                  <div className="grid-2">
                    <div className="form-group">
                      <label className="form-label">Pickup date</label>
                      <input
                        type="date"
                        className={`form-input ${errors.pickupDate?'input-error':''}`}
                        value={form.pickupDate}
                        min={today}
                        onChange={e=>handlePickupDateChange(e.target.value)}
                      />
                      {errors.pickupDate && <span className="error-msg">{errors.pickupDate}</span>}
                    </div>
                    <div className="form-group">
                      <label className="form-label">Pickup time</label>
                      <select className="form-input" value={form.pickupTime} onChange={e=>setF('pickupTime',e.target.value)}>
                        {TIMES.map(t=><option key={t}>{t}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="grid-2">
                    <div className="form-group">
                      <label className="form-label">Return date</label>
                      <input
                        type="date"
                        className={`form-input ${errors.returnDate?'input-error':''}`}
                        value={form.returnDate}
                        min={form.pickupDate||today}
                        onChange={e=>handleReturnDateChange(e.target.value)}
                      />
                      {errors.returnDate && <span className="error-msg">{errors.returnDate}</span>}
                    </div>
                    <div className="form-group">
                      <label className="form-label">Return time</label>
                      <select className={`form-input ${errors.returnTime?'input-error':''}`} value={form.returnTime} onChange={e=>setF('returnTime',e.target.value)}>
                        {TIMES.map(t=><option key={t}>{t}</option>)}
                      </select>
                      {errors.returnTime && <span className="error-msg">{errors.returnTime}</span>}
                      {returnTimeInvalid && !errors.returnTime && (
                        <span className="error-msg">Return time must be later than pickup time for same-day rentals.</span>
                      )}
                    </div>
                  </div>

                  {/* Trip summary preview */}
                  <TripSummaryBlock/>

                  <div className="form-group">
                    <label className="form-label">Special requests (optional)</label>
                    <textarea className="form-input" value={form.specialRequests} onChange={e=>setF('specialRequests',e.target.value)} placeholder="E.g. child seat, GPS, cross-border travel countries…"/>
                  </div>
                  <div className="divider"/>
                  <label className={`checkbox-row ${errors.agreedTerms?'input-error':''}`}>
                    <input type="checkbox" checked={form.agreedTerms} onChange={e=>setF('agreedTerms',e.target.checked)}/>
                    <span>I have read and agree to the <strong>Terms &amp; Conditions</strong>, <strong>Privacy Policy</strong>, and <strong>Cancellation Policy</strong>. I understand the reservation fee is non-refundable after 48 hours unless the vehicle cannot be provided.</span>
                  </label>
                  {errors.agreedTerms && <span className="error-msg">{errors.agreedTerms}</span>}
                  <label className={`checkbox-row ${errors.agreedAge?'input-error':''}`}>
                    <input type="checkbox" checked={form.agreedAge} onChange={e=>setF('agreedAge',e.target.checked)}/>
                    <span>I confirm I hold a valid full driving licence in my name and meet the minimum driver age requirement of {vehicle.minAge} for this vehicle.</span>
                  </label>
                  {errors.agreedAge && <span className="error-msg">{errors.agreedAge}</span>}
                  <div className="alert alert-warn" style={{fontSize:12}}><Icon name="mdi:alert-outline" sz={16} cls="icon-gold" style={{flexShrink:0}}/> {OPERATIONAL_DISCLAIMER}</div>
                </div>
                <div style={{marginTop:'1.25rem', display:'flex', gap:'0.75rem', justifyContent:'space-between'}}>
                  <button className="btn btn-outline" onClick={()=>setStep(1)}>← Back</button>
                  <button className="btn btn-primary" onClick={handleNext}>Proceed to payment →</button>
                </div>
              </div>
            )}

            {step===3 && (
              <div className="card card-body">
                <h2 style={{color:'var(--navy)', fontWeight:700, marginBottom:'0.5rem', fontSize:'1.15rem'}}>Pay to reserve your vehicle</h2>
                <p style={{color:'var(--text-muted)', fontSize:14, marginBottom:'1.25rem'}}>You're paying <strong style={{color:'var(--navy)'}}>{fmt(p.reservationFee)}</strong> to reserve the {vehicle.name} with {vehicle.supplier}. This is deducted from the balance you owe at collection.</p>

                {/* Full booking summary before payment */}
                <TripSummaryBlock/>

                {/* Payment method selector
                    ──────────────────────────────────────────────────────────────
                    Rampex integration: create-rampex-payment-link Netlify function
                    creates a hosted payment link. Customer is redirected there.
                    On return, handleRampexReturnIfNeeded() checks status.
                    Klarna remains disabled until merchant integration is approved.
                    ────────────────────────────────────────────────────────────── */}
                <div style={{fontWeight:700, color:'var(--navy)', fontSize:14, marginBottom:'0.875rem', marginTop:'1rem'}}>
                  <Icon name="mdi:credit-card-outline" sz={18} cls="icon-navy" style={{marginRight:6}}/> Choose payment method
                </div>

                <div className="pay-methods">
                  {/* A — DriveEuro Secure Checkout */}
                  <div className={`pay-card ${payMethod==='rampex'?'pay-sel':''}`} onClick={()=>setPayMethod('rampex')}>
                    <div className="pay-radio"><div className="pay-radio-dot"/></div>
                    <div className="pay-info">
                      <div className="pay-label">DriveEuro Secure Checkout</div>
                      <div className="pay-sub">Pay your reservation fee securely by card or supported payment method.</div>
                    </div>
                    <Icon name="mdi:shield-check-outline" sz={20} cls="icon-muted"/>
                  </div>

                  {/* B — Card / Provider Checkout */}
                  <div className={`pay-card ${payMethod==='card'?'pay-sel':''}`} onClick={()=>setPayMethod('card')}>
                    <div className="pay-radio"><div className="pay-radio-dot"/></div>
                    <div className="pay-info">
                      <div className="pay-label">Card / Provider Checkout</div>
                      <div className="pay-sub">Card and regional payment options may be available at checkout.</div>
                    </div>
                    <Icon name="mdi:credit-card-outline" sz={20} cls="icon-muted"/>
                  </div>

                  {/* C — Klarna (disabled) */}
                  <div className="pay-card pay-disabled">
                    <div className="pay-radio"/>
                    <div className="pay-info">
                      <div className="pay-label" style={{display:'flex', alignItems:'center', gap:8}}>Klarna <span className="pay-soon">Coming Soon</span></div>
                      <div className="pay-sub">Flexible payment options coming soon.</div>
                    </div>
                    <Icon name="mdi:clock-outline" sz={20} cls="icon-muted"/>
                  </div>
                </div>

                {payMsg && (
                  <div className="alert a-warn" style={{marginBottom:'1rem', fontSize:13}}>
                    <Icon name="mdi:alert-circle-outline" sz={16} cls="icon-gold" style={{flexShrink:0}}/> {payMsg}
                  </div>
                )}

                {payProcessing ? (
                  <div style={{textAlign:'center', padding:'1.5rem', background:'var(--ice)', borderRadius:10}}>
                    <div style={{marginBottom:'0.5rem'}}><Icon name="mdi:loading" sz={32} cls="icon-muted"/></div>
                    <div style={{fontWeight:700, color:'var(--navy)', marginBottom:'0.25rem'}}>Redirecting to secure checkout…</div>
                    <div style={{fontSize:13, color:'var(--text-muted)'}}>Please do not close this page.</div>
                  </div>
                ) : (payMethod === 'rampex' || payMethod === 'card') ? (
                  <button className="btn-secure-checkout" onClick={()=>startPaymentFlow(payMethod)}>
                    <Icon name="mdi:lock-check-outline" sz={18} cls="icon-white"/>
                    Continue to Secure Checkout — {fmt(p.reservationFee)}
                  </button>
                ) : (
                  <button className="btn-pay-secure" style={{opacity:.5,cursor:'not-allowed'}} disabled>
                    <Icon name="mdi:lock-check-outline" sz={18} cls="icon-white"/>
                    Select a payment method to continue
                  </button>
                )}
                <div className="stripe-lock" style={{marginTop:'.75rem'}}>
                  <Icon name="mdi:lock-outline" sz={14} cls="icon-faint"/> SSL encrypted · No card details stored by DriveEuro
                </div>
                <div style={{fontSize:12, color:'var(--text-faint)', marginTop:'0.625rem', lineHeight:1.6}}>
                  Your reservation fee is processed securely. Available payment methods may vary by region and provider.
                </div>
                <div style={{marginTop:'1rem'}}>
                  <button className="btn btn-outline btn-sm" onClick={()=>setStep(2)}>← Back</button>
                </div>
              </div>
            )}
          </div>
          <div>
            <SummaryBar/>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Confirmation ──────────────────────────────────────────────────────

  if (!data) return <div className="container" style={{padding:'3rem'}}><button className="btn btn-navy btn-sm" onClick={()=>navigate('home')}>Home</button></div>;

  return (
    <div className="page">
      <div className="confirm-hero">
        <div className="confirm-icon"><Icon name="mdi:check-decagram-outline" sz={36} cls="icon-gold"/></div>
        <h1 style={{fontSize:'1.9rem', fontWeight:800, marginBottom:'0.5rem'}}>Vehicle Reserved</h1>
        <p style={{color:'rgba(255,255,255,0.8)', fontSize:'1.05rem', maxWidth:520, margin:'0 auto 0.75rem'}}>Your rental has been secured. Please bring your driving licence, payment card, and any required ID to collection.</p>
        <div style={{display:'inline-block', background:'rgba(201,162,39,0.18)', border:'1px solid rgba(201,162,39,0.35)', borderRadius:20, padding:'0.4rem 1rem', fontSize:13, fontWeight:600, color:'var(--gold)', marginTop:'0.5rem'}}>Booking Confirmed · Reference: {data.id}</div>
      </div>

      <div className="container" style={{padding:'2rem 1.5rem'}}>
        <div className="confirm-layout">
          <div>
            <div className="card card-body" style={{marginBottom:'1.25rem'}}>
              <h2 style={{color:'var(--navy)', fontWeight:700, marginBottom:'1.1rem'}}>What to expect</h2>
              {[
                ['mdi:email-check-outline','Confirmation email','Full collection details — including the supplier address, desk instructions, and your balance — are on their way to ' + data.email + '.'],
                ['mdi:cash-clock','Balance due at collection','The remaining balance of ' + fmt(data.remaining) + ' is paid directly to the supplier when you collect the vehicle. No additional platform fees.'],
                ['mdi:card-account-details-outline','What to bring','Your booking confirmation, a valid driving licence in the driver\'s name, the payment card used today (for the deposit hold), and valid photo ID.'],
                ['mdi:refresh','If the vehicle is unavailable','In the unlikely event we cannot fulfil this reservation, ' + REFUND_NOTE],
              ].map(([icon,h,p],i)=>(

function AdminPage({ navigate, bookings, setBookings }) {
  const [tab, setTab] = useState('bookings');
  const [edit, setEdit] = useState(null);
  const [filterStatus, setFilterStatus] = useState('');
  const [search, setSearch] = useState('');

  const filtered = bookings.filter(b => {
    if (filterStatus && b.status !== filterStatus) return false;
    if (search) { const s = search.toLowerCase(); return b.id.toLowerCase().includes(s)||b.customer.toLowerCase().includes(s)||b.vehicle.toLowerCase().includes(s)||b.email.toLowerCase().includes(s); }
    return true;
  });

  const stats = {
    total: bookings.length,
    reserved: bookings.filter(b=>b.status==='reserved').length,
    confirmed: bookings.filter(b=>b.status==='confirmed').length,
    balance: bookings.filter(b=>b.status==='balance').length,
    feesCollected: bookings.reduce((s,b)=>s+b.reservationFee,0),
    totalValue: bookings.reduce((s,b)=>s+b.discountedPrice,0),

  return (
    <div className="admin-layout">

                      <td style={{fontSize:13}}>{b.vehicle}<div style={{fontSize:11, color:'var(--text-faint)'}}>{b.supplier}</div></td>
                      <td style={{fontSize:12, color:'var(--text-muted)'}}>{b.pickup}</td>
                      <td style={{fontSize:12, color:'var(--text-muted)', whiteSpace:'nowrap'}}>{b.pickupDate}<br/>{b.returnDate}</td>
                      <td style={{fontSize:12, color:'var(--text-muted)', textDecoration:'line-through'}}>{fmt(b.originalPrice)}</td>
                      <td style={{fontWeight:700, color:'var(--navy)'}}>{fmt(b.discountedPrice)}</td>
                      <td style={{fontWeight:700, color:'var(--success)', whiteSpace:'nowrap'}}>{fmt(b.reservationFee)}</td>
                      <td style={{fontWeight:600}}>{fmt(b.discountedPrice-b.reservationFee)}</td>
                      <td><span className={`status ${statusCls(b.status)}`}>{statusLabel(b.status)}</span></td>
                      <td><button className="btn btn-outline btn-sm" onClick={()=>setEdit({...b})}>Edit</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {filtered.length===0 && <div style={{textAlign:'center', padding:'3rem', color:'var(--text-muted)'}}>No bookings match your filters.</div>}
          </div>
        )}
        {tab==='pricing' && (
          <PricingIntelligenceTab/>
        )}
      </div>
      {edit && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEdit(null)}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Edit booking — {edit.id}</div>
              <button onClick={()=>setEdit(null)} style={{fontSize:'1.25rem', color:'var(--text-muted)', padding:'0.25rem'}}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{display:'flex', flexDirection:'column', gap:'0.9rem'}}>
                <div className="alert alert-info" style={{fontSize:12}}>
                  <div><strong>{edit.customer}</strong> · {edit.email} · {edit.phone}<br/>{edit.vehicle} ({edit.supplier}) · {edit.pickup} · {edit.pickupDate} → {edit.returnDate}</div>
                </div>

                <div className="form-group">
                  <label className="form-label">Booking status</label>
                  <select className="form-input" value={edit.status} onChange={e=>setEdit(m=>({...m,status:e.target.value}))}>
                    {STATUS_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                </div>

                <div className="divider"/>
                <div style={{fontSize:12, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.05em'}}>Pricing (editable)</div>
                <div className="grid-3">
                  <div className="form-group">
                    <label className="form-label">Original price (£)</label>
                    <input type="number" className="form-input" step="0.01" value={edit.originalPrice} onChange={e=>setEdit(m=>({...m,originalPrice:parseFloat(e.target.value)||0}))}/>
                  </div>
                  <div className="form-group">
                    <label className="form-label">DriveEuro Price (£)</label>
                    <input type="number" className="form-input" step="0.01" value={edit.discountedPrice} onChange={e=>setEdit(m=>({...m,discountedPrice:parseFloat(e.target.value)||0}))}/>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Reservation fee (£)</label>
                    <input type="number" className="form-input" step="0.01" value={edit.reservationFee} onChange={e=>setEdit(m=>({...m,reservationFee:parseFloat(e.target.value)||0}))}/>
                  </div>
                </div>
                <div style={{background:'var(--ice)', borderRadius:8, padding:'0.75rem', fontSize:13}}>
                  <strong>Calculated balance due:</strong> {fmt(Math.max(0, edit.discountedPrice - edit.reservationFee))}
                  {' · '}<strong>Saved vs retail:</strong> {fmt(Math.max(0, edit.originalPrice - edit.discountedPrice))}
                </div>

                <div className="divider"/>
                <div style={{fontSize:12, fontWeight:700, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.05em'}}>Supplier details</div>
                <div className="form-group">
                  <label className="form-label">Supplier confirmation reference</label>
                  <input className="form-input" value={edit.supplierRef} onChange={e=>setEdit(m=>({...m,supplierRef:e.target.value}))} placeholder="e.g. EUR-4521"/>
                </div>
                <div className="form-group">
                  <label className="form-label">Balance payment notes</label>
                  <textarea className="form-input" style={{minHeight:64}} value={edit.balanceNotes} onChange={e=>setEdit(m=>({...m,balanceNotes:e.target.value}))} placeholder="e.g. Customer to pay £630 at desk…"/>
                </div>
                <div className="form-group">
                  <label className="form-label">Internal notes (not sent to customer)</label>
                  <textarea className="form-input" style={{minHeight:64}} value={edit.internalNotes} onChange={e=>setEdit(m=>({...m,internalNotes:e.target.value}))} placeholder="Internal staff notes only…"/>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={()=>setEdit(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={()=>{ setBookings(prev=>prev.map(b=>b.id===edit.id?edit:b)); setEdit(null); }}>Save changes</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    ['Is my payment secure?','Yes. Payments are processed by Stripe, a PCI DSS Level 1 certified provider. No card details are stored by DriveEuro.'],

  return (
